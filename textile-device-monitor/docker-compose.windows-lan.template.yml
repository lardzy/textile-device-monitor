version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: textile-monitor-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: textile_monitor
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - textile-net

  area-infer:
    build: ./area-infer
    container_name: textile-area-infer
    restart: unless-stopped
    environment:
      AREA_WEIGHTS_DIR: /opt/area_weights
      AREA_YOLACT_VENDOR_ROOT: /app/vendor/yolact
    volumes:
      - "D:/textile-device-monitor/runtime/area-models:/opt/area_weights:ro"
    ports:
      - "9001:9001"
    networks:
      - textile-net

  backend:
    build: ./backend
    container_name: textile-monitor-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://admin:password123@postgres:5432/textile_monitor
      SECRET_KEY: your-secret-key-change-in-production
      HEARTBEAT_TIMEOUT: 30
      DATA_RETENTION_DAYS: 30
      CORS_ORIGINS: http://localhost,http://localhost:80,http://backend:8000
      AREA_WEIGHTS_DIR: /opt/area_weights
      AREA_INFER_URL: http://area-infer:9001
      AREA_INFER_TIMEOUT_SEC: 60
      AREA_OUTPUT_DIR: /data/area_outputs
      # 在面积识别页面中请填写：
      # root_path=/data/area_root
      # old_root_path=/data/area_old
      # result_output_root=/data/area_outputs
    volumes:
      - type: bind
        source: '\\192.168.105.66\17检验八部\10特纤\02-检验\横截面'
        target: /data/area_root
      - type: bind
        source: '\\192.168.105.82\材料检测中心\10特纤\02-检验'
        target: /data/area_old
      - type: bind
        source: '\\192.168.105.66\17检验八部\10特纤\02-检验\横截面_结果'
        target: /data/area_outputs
      - type: bind
        source: 'D:/textile-device-monitor/runtime/area-models'
        target: /opt/area_weights
        read_only: true
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - area-infer
    networks:
      - textile-net

  frontend:
    build: ./frontend
    container_name: textile-monitor-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - textile-net

volumes:
  postgres_data:

networks:
  textile-net:
    driver: bridge
